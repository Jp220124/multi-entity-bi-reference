name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: quality · ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check agents context orchestrator schemas examples tests conftest.py smoke_test.py

      - name: Type check (mypy --strict)
        run: mypy --strict agents context orchestrator schemas

      - name: Unit + integration tests (pytest)
        run: pytest -v --no-header

      - name: Smoke test (pytest-free runner)
        run: python smoke_test.py

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit declared dependencies
        run: |
          pip install -e ".[dev]"
          pip-audit --desc
